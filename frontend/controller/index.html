<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walter Zoo Demo Controls</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="controller-page">
      <section class="controller-card" aria-label="Demo Controls">
        <h1>Demo Controls</h1>
        <p>Steuert den Demo-Status der laufenden App.</p>

        <button id="reset-companion" class="control-btn control-btn--danger" type="button">
          Companion zuruecksetzen
        </button>
        <button id="reset-feed" class="control-btn" type="button">Feed-Timer resetten</button>
        <button id="reset-quiz" class="control-btn" type="button">Quiz-Timer resetten</button>
        <button id="reset-challenge" class="control-btn" type="button">Challenge-Timer resetten</button>

        <label class="input-label" for="happiness-input">Happiness (0-100)</label>
        <div class="input-row">
          <input id="happiness-input" type="number" min="0" max="100" value="50" />
          <button id="set-happiness" class="control-btn" type="button">Setzen</button>
        </div>

        <small id="connection-status" class="status">Verbinde...</small>
      </section>
    </main>
  </body>
</html>
